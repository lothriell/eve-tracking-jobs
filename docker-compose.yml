name: ${PROJECT_NAME:-eve-esi-app}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/database/data/eve_esi.db
      - EVE_CLIENT_ID=${EVE_CLIENT_ID}
      - EVE_CLIENT_SECRET=${EVE_CLIENT_SECRET}
      - EVE_REDIRECT_URI=${EVE_REDIRECT_URI:-http://${SERVER_IP:-10.69.10.15}:${PORT:-9000}/auth/callback}
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://${SERVER_IP:-10.69.10.15}:${PORT:-9000}}
    volumes:
      - eve-esi-data:/app/database/data
    networks:
      - eve-esi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://${SERVER_IP:-10.69.10.15}:3001
    restart: unless-stopped
    ports:
      - "${PORT:-9000}:80"
    depends_on:
      - backend
    networks:
      - eve-esi-network

volumes:
  eve-esi-data:
    driver: local

networks:
  eve-esi-network:
    driver: bridge
