# =============================================================================
# EVE Industry Tracker - Docker Compose Configuration
# =============================================================================
#
# This application is fully configured via the .env file.
# Copy .env.example to .env and update YOUR_SERVER_ADDRESS
# with your deployment IP or hostname.
#
# Supported deployments:
#   - Local IP (e.g., 192.168.1.100)
#   - Tailscale IP (e.g., 100.82.8.96)
#   - Hostname (e.g., eve-tracker.local)
#   - Tailscale MagicDNS (e.g., server.tailnet.ts.net)
#
# Quick Start:
#   1. cp .env.example .env
#   2. Edit .env with your settings
#   3. docker-compose up -d --build
#
# See .env.example and docs/CONFIGURATION.md for detailed options.
# =============================================================================

name: ${PROJECT_NAME:-eve-esi-app}

services:
  # Backend API Server (Node.js + Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/database/data/eve_esi.db
      - EVE_CLIENT_ID=${EVE_CLIENT_ID}
      - EVE_CLIENT_SECRET=${EVE_CLIENT_SECRET}
      - EVE_REDIRECT_URI=${EVE_REDIRECT_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - eve-esi-data:/app/database/data
    networks:
      - eve-esi-network

  # Frontend Web Server (React + Nginx)
  # Nginx proxies /auth/ and /api/ requests to backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-9000}:80"
    depends_on:
      - backend
    networks:
      - eve-esi-network

volumes:
  eve-esi-data:
    driver: local

networks:
  eve-esi-network:
    driver: bridge
